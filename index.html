<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nakayama | Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    width: 350px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    animation: fadeIn 1.5s ease;
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: white;
    margin: 0 auto 20px;
}

h1 {
    margin: 10px 0;
    font-weight: 600;
}

p {
    font-weight: 300;
    opacity: 0.9;
}

.button {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 25px;
    border-radius: 25px;
    background: white;
    color: #764ba2;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.button:hover {
    background: #ddd;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <div class="profile-img"></div>
    <h1>Nakayama</h1>
    <p>Hello! I'm Nakayama.</p>
    <p>Welcome to my profile page.</p>
    <a href="#" class="button">Follow Me</a>
</div>

</body>
</html>
